name: CI

on:
  push:
    branches: [develop, main, "release/**"]
  pull_request:
    branches: [main, "release/**"]

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          # - windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: spore-core-nodes
      - uses: actions/checkout@v4
        with:
          repository: sporeos-dev/spore-client-libs
          path: spore-client-libs
      - uses: actions/setup-go@v5
        with:
          go-version-file: spore-core-nodes/spore/go.mod
      - run: make check
        working-directory: spore-core-nodes

  analyze:
    if: github.event_name == 'pull_request'
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: spore-core-nodes
      - uses: actions/checkout@v4
        with:
          repository: sporeos-dev/spore-client-libs
          path: spore-client-libs
      - uses: actions/setup-go@v5
        with:
          go-version-file: spore-core-nodes/spore/go.mod
      - run: make setup
        working-directory: spore-core-nodes
      - run: make analyze
        working-directory: spore-core-nodes
